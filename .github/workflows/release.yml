name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: libsockd.dylib
            static: libsockd.a
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: libsockd.dylib
            static: libsockd.a
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: libsockd.so
            static: libsockd.a
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: libsockd.so
            static: libsockd.a

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifacts
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT: ${{ matrix.artifact }}
          STATIC: ${{ matrix.static }}
        run: |
          mkdir -p dist
          cp "target/${TARGET}/release/${ARTIFACT}" dist/ 2>/dev/null || true
          cp "target/${TARGET}/release/${STATIC}" dist/ 2>/dev/null || true
          cp include/sockd.h dist/
          cp include/module.modulemap dist/
          tar czf "sockd-${TARGET}.tar.gz" -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sockd-${{ matrix.target }}
          path: sockd-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            artifacts/**/*.tar.gz
